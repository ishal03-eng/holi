<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Holi Janu 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Kalam:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff4fa3;
      --yellow: #ffe94f;
      --green: #4fffb0;
      --blue: #4fc3ff;
      --orange: #ff7c4f;
      --purple: #c44fff;
      --red: #ff4f4f;
      --cyan: #4ffff7;
    }

    body {
      background: #1a0a2e;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Kalam', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── SCENE WRAPPER ── */
    #scene {
      position: relative;
      width: min(420px, 95vw);
      height: min(580px, 90vh);
      margin: auto;
      overflow: hidden;
    }

    /* ── BACKGROUND SKY ── */
    .sky {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #2d1054 0%, #1a0a2e 70%);
      border-radius: 24px;
      overflow: hidden;
    }
    /* rangoli floor */
    .floor {
      position: absolute; bottom: 0; left: 0; right: 0; height: 34%;
      background: radial-gradient(ellipse at 50% 100%, #3b1a6e 0%, #1a0a2e 80%);
      border-top: 2px solid rgba(255,255,255,0.07);
    }

    /* ── FLOATING POWDER DUST (background atmosphere) ── */
    .dust {
      position: absolute;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0;
      pointer-events: none;
    }

    /* ── GIRL SVG ── */
    #girl-wrap {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      transition: opacity .4s;
    }

    /* ── COLOR BLOBS (splashes around girl) ── */
    .blob {
      position: absolute;
      border-radius: 60% 40% 55% 45% / 50% 55% 45% 50%;
      opacity: 0;
      pointer-events: none;
      transform-origin: center;
      filter: blur(1px);
    }

    /* ── PICHKARI STREAMS ── */
    .stream {
      position: absolute;
      height: 6px;
      border-radius: 3px;
      opacity: 0;
      transform-origin: left center;
      pointer-events: none;
      filter: blur(1.5px);
    }

    /* ── HAPPY HOLI TEXT ── */
    #holi-text {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }
    #holi-text .h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(28px, 8vw, 42px);
      background: linear-gradient(135deg, #ff4fa3, #ffe94f, #4fffb0, #4fc3ff, #ff7c4f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255,100,180,0.8));
      line-height: 1.1;
    }
    #holi-text .h2 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(22px, 6vw, 34px);
      color: #ffe94f;
      filter: drop-shadow(0 0 10px rgba(255,233,79,0.9));
      margin-top: 2px;
    }
    #holi-text .h3 {
      font-family: 'Kalam', cursive;
      font-size: clamp(13px, 3.5vw, 17px);
      color: #ffb3d9;
      margin-top: 6px;
      filter: drop-shadow(0 0 6px rgba(255,80,163,0.7));
    }

    /* ── HUG COUPLE (final scene) ── */
    #couple-wrap {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 210px;
      opacity: 0;
      pointer-events: none;
      z-index: 15;
    }

    /* ── HEART BURST ── */
    .heart {
      position: absolute;
      font-size: 18px;
      opacity: 0;
      pointer-events: none;
      animation: none;
    }

    /* ── CANVAS for particle confetti ── */
    #canvas {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    /* ── OUTER GLOW FRAME ── */
    .frame {
      position: relative;
      border-radius: 26px;
      padding: 3px;
      background: linear-gradient(135deg, #ff4fa3, #ffe94f, #4fffb0, #4fc3ff, #ff4fa3);
      background-size: 300% 300%;
      animation: borderAnim 3s linear infinite;
      box-shadow: 0 0 40px rgba(255,79,163,0.5), 0 0 80px rgba(79,195,255,0.3);
    }
    @keyframes borderAnim {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── ANIMATIONS ── */
    @keyframes blobIn {
      0%   { transform: scale(0) rotate(0deg); opacity: 0; }
      60%  { opacity: .85; }
      100% { transform: scale(1) rotate(var(--r)); opacity: .8; }
    }
    @keyframes streamShoot {
      0%   { opacity: .9; transform: scaleX(0) rotate(var(--a)); }
      60%  { opacity: .85; transform: scaleX(1) rotate(var(--a)); }
      100% { opacity: 0; transform: scaleX(1.1) rotate(var(--a)) translateX(10px); }
    }
    @keyframes dustFloat {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      30%  { opacity: .45; }
      100% { opacity: 0; transform: translateY(-90px) scale(1.6); }
    }
    @keyframes textSplash {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.3) rotate(-6deg); }
      60%  { transform: translateX(-50%) scale(1.08) rotate(2deg); opacity: 1; }
      80%  { transform: translateX(-50%) scale(0.97) rotate(-1deg); }
      100% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes heartFloat {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--hx)), calc(-50% - 80px)) scale(1.5); }
    }
    @keyframes coupleIn {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.7); }
      70%  { transform: translateX(-50%) scale(1.04); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }
    @keyframes girlColorCover {
      0%   { filter: none; }
      100% { filter: hue-rotate(20deg) saturate(2) brightness(0.95); }
    }
    @keyframes twinkle {
      0%,100% { opacity: .2; transform: scale(1); }
      50%      { opacity: 1;  transform: scale(1.5); }
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px rgba(255,79,163,0.5), 0 0 80px rgba(79,195,255,0.3); }
      50%      { box-shadow: 0 0 60px rgba(255,79,163,0.9), 0 0 120px rgba(255,233,79,0.5); }
    }

    /* stars */
    .star {
      position: absolute;
      width: 3px; height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .frame { border-radius: 18px; }
    }
  </style>
</head>

<script>
const scene   = document.getElementById('scene');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const sky     = document.getElementById('sky');
const girlWrap = document.getElementById('girl-wrap');
const girlColors = document.getElementById('girl-colors');
const holiText  = document.getElementById('holi-text');
const coupleWrap = document.getElementById('couple-wrap');

// Resize canvas
function resizeCanvas() {
  canvas.width  = scene.offsetWidth;
  canvas.height = scene.offsetHeight;
}
resizeCanvas();

// ── STARS ──
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*55}%;
    animation-delay:${Math.random()*3}s;
    animation-duration:${1.5+Math.random()*2}s;
    opacity:${0.3+Math.random()*0.7};
  `;
  sky.appendChild(s);
}

// ── COLOR PALETTE ──
const colors = [
  '#ff4fa3','#ffe94f','#4fffb0','#4fc3ff',
  '#ff7c4f','#c44fff','#ff4f4f','#4ffff7',
  '#ff99cc','#99ff99','#ffcc44','#44ccff'
];

// ── PARTICLES ──
const particles = [];
class Particle {
  constructor(x,y,color) {
    this.x = x; this.y = y; this.color = color;
    this.r = 3 + Math.random()*8;
    this.vx = (Math.random()-0.5)*7;
    this.vy = -4 - Math.random()*6;
    this.gravity = 0.18;
    this.life = 1;
    this.decay = 0.012+Math.random()*0.018;
    this.shape = Math.random() > 0.5 ? 'circle' : 'blob';
  }
  update() {
    this.vx *= 0.98;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life * 0.85;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    if (this.shape === 'circle') {
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    } else {
      ctx.ellipse(this.x, this.y, this.r*1.4, this.r*0.8, this.vx*0.3, 0, Math.PI*2);
    }
    ctx.fill();
    ctx.restore();
  }
}

function spawnBurst(x, y, count, colorSet) {
  for (let i = 0; i < count; i++) {
    const c = colorSet ? colorSet[Math.floor(Math.random()*colorSet.length)] : colors[Math.floor(Math.random()*colors.length)];
    particles.push(new Particle(x, y, c));
  }
}

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw(ctx);
    if (particles[i].life <= 0) particles.splice(i,1);
  }
  requestAnimationFrame(animParticles);
}
animParticles();

// ── CREATE BLOB SPLASHES ──
function createBlob(x, y, size, color, delay) {
  const b = document.createElement('div');
  b.className = 'blob';
  b.style.cssText = `
    width:${size}px; height:${size*0.75}px;
    background:${color};
    left:${x}px; top:${y}px;
    --r:${(Math.random()-0.5)*40}deg;
    animation: blobIn ${0.5+Math.random()*0.3}s ease-out ${delay}s forwards;
  `;
  scene.appendChild(b);
  return b;
}

// ── CREATE STREAM ──
function createStream(x, y, length, color, angle, delay) {
  const s = document.createElement('div');
  s.className = 'stream';
  s.style.cssText = `
    width:${length}px;
    background: linear-gradient(90deg, ${color}cc, ${color}22);
    left:${x}px; top:${y}px;
    --a:${angle}deg;
    animation: streamShoot 0.7s ease-out ${delay}s forwards;
  `;
  scene.appendChild(s);
}

// ── CREATE DUST ──
function createDust(x, y, size, color, delay) {
  const d = document.createElement('div');
  d.className = 'dust';
  d.style.cssText = `
    width:${size}px; height:${size}px;
    background:${color};
    left:${x}px; top:${y}px;
    animation: dustFloat ${1.5+Math.random()}s ease-out ${delay}s forwards;
  `;
  scene.appendChild(d);
}

// ── SPAWN HEARTS ──
function spawnHeart(x, y) {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = ['💕','❤️','💗','💖','🩷'][Math.floor(Math.random()*5)];
  h.style.cssText = `
    left:${x}px; top:${y}px;
    --hx:${(Math.random()-0.5)*80}px;
    animation: heartFloat 1.5s ease-out forwards;
    z-index:25;
  `;
  scene.appendChild(h);
  setTimeout(()=>h.remove(), 1600);
}

// ── TIMELINE ──
const W = scene.offsetWidth, H = scene.offsetHeight;
const cx = W/2, girly = H*0.38; // approx girl center

// Phase 1 (0–2s): Ambience dust
setTimeout(()=>{
  for (let i=0; i<8; i++) {
    createDust(
      cx - 60 + Math.random()*120,
      girly - 20 + Math.random()*60,
      40+Math.random()*60,
      colors[Math.floor(Math.random()*colors.length)],
      i*0.25
    );
  }
}, 400);

// Phase 2 (1.5s): Streams shoot in from sides
setTimeout(()=>{
  const streamData = [
    { x: 5,   y: girly-20, len: 110, color: '#ff4fa3', angle: 8 },
    { x: 5,   y: girly+10, len: 90,  color: '#ffe94f', angle: -5 },
    { x: W-120, y: girly-15, len: 110, color: '#4fc3ff', angle: 175 },
    { x: W-100, y: girly+5, len:  90,  color: '#4fffb0', angle: -172 },
    { x: cx-20, y: 15,     len: 95,  color: '#c44fff', angle: 85 },
    { x: cx+10, y: 15,     len: 95,  color: '#ff7c4f', angle: 88 },
  ];
  streamData.forEach((s,i) => createStream(s.x, s.y, s.len, s.color, s.angle, i*0.15));
  // burst particles on girl
  spawnBurst(cx, girly, 35, ['#ff4fa3','#ffe94f','#4fffb0','#4fc3ff']);
}, 1500);

// Phase 3 (2.2s): Big blobs appear on/around girl
setTimeout(()=>{
  const blobData = [
    { x: cx-65, y: girly-70, s: 70, c: 'rgba(255,79,163,0.82)' },
    { x: cx+25, y: girly-85, s: 60, c: 'rgba(79,255,176,0.78)' },
    { x: cx-55, y: girly,    s: 55, c: 'rgba(255,233,79,0.8)' },
    { x: cx+30, y: girly+5,  s: 50, c: 'rgba(196,79,255,0.75)' },
    { x: cx-30, y: girly+60, s: 65, c: 'rgba(79,195,255,0.72)' },
    { x: cx+10, y: girly+65, s: 55, c: 'rgba(255,124,79,0.78)' },
  ];
  blobData.forEach((b,i) => createBlob(b.x, b.y, b.s, b.c, i*0.12));
  // more particles
  spawnBurst(cx-20, girly-30, 30, ['#c44fff','#ff7c4f','#ff4f4f']);
  spawnBurst(cx+20, girly+20, 30, ['#4ffff7','#ffe94f','#4fffb0']);
}, 2200);

// Phase 3b (3s): Girl gets color on her
setTimeout(()=>{
  girlColors.style.transition = 'opacity 0.8s ease';
  girlColors.style.opacity = '1';
  // extra dust cloud
  for (let i=0; i<12; i++) {
    createDust(
      cx - 70 + Math.random()*140,
      girly - 40 + Math.random()*100,
      50+Math.random()*80,
      colors[Math.floor(Math.random()*colors.length)],
      i*0.18
    );
  }
  spawnBurst(cx, girly-10, 50, colors);
}, 3000);

// Phase 4 (4.5s): MORE BLOBS — bigger color storm
setTimeout(()=>{
  for (let i=0;i<10;i++) {
    const angle = (i/10)*Math.PI*2;
    const r = 55 + Math.random()*40;
    createBlob(
      cx + Math.cos(angle)*r - 25,
      girly + Math.sin(angle)*r*0.55 - 25,
      35+Math.random()*45,
      colors[Math.floor(Math.random()*colors.length)].replace(')',',0.72)').replace('#','rgba(').replace('rgba(','rgba(').replace(/rgba\(([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2}),0\.72\)/, (m,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},0.72)`),
      i*0.1
    );
  }
  spawnBurst(cx, girly-50, 60, colors);
  spawnBurst(cx-40, girly+40, 40, colors);
  spawnBurst(cx+40, girly+40, 40, colors);
}, 4500);

// Phase 5 (5.8s): HAPPY HOLI text splashes in
setTimeout(()=>{
  holiText.style.animation = 'textSplash 1s cubic-bezier(0.34,1.56,0.64,1) forwards';
  spawnBurst(cx, H*0.14, 80, colors);
  // spawn hearts
  for (let i=0;i<6;i++) {
    setTimeout(()=>spawnHeart(cx-60+Math.random()*120, H*0.35+Math.random()*60), i*200);
  }
}, 5800);

// Phase 6 (7.5s): Fade out girl, fade in hugging couple
setTimeout(()=>{
  // continuous particle storm
  let stormCount = 0;
  const storm = setInterval(()=>{
    spawnBurst(cx-50+Math.random()*100, H*0.5+Math.random()*100, 15, colors);
    stormCount++;
    if (stormCount > 12) clearInterval(storm);
  }, 180);
}, 7500);

setTimeout(()=>{
  girlWrap.style.transition = 'opacity 0.8s ease';
  girlWrap.style.opacity = '0';

  // hide existing blobs
  document.querySelectorAll('.blob,.stream,.dust').forEach(el=>{
    el.style.transition='opacity 0.6s';
    el.style.opacity='0';
    setTimeout(()=>el.remove(),700);
  });
}, 8200);

setTimeout(()=>{
  coupleWrap.style.animation = 'coupleIn 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards';
  spawnBurst(cx, H*0.5, 120, colors);
  spawnBurst(cx-50, H*0.6, 60, colors);
  spawnBurst(cx+50, H*0.6, 60, colors);

  // final heart rain
  for (let i=0;i<14;i++) {
    setTimeout(()=>spawnHeart(40+Math.random()*(W-80), H*0.2+Math.random()*H*0.5), i*220);
  }

  // frame pulse
  document.getElementById('frame').style.animation =
    'borderAnim 3s linear infinite, pulse 1.5s ease-in-out infinite';
}, 9200);

// continuous ambient hearts after couple appears
setTimeout(()=>{
  setInterval(()=>{
    spawnHeart(40+Math.random()*(W-80), H*0.3+Math.random()*H*0.4);
  }, 800);
}, 11000);

// ongoing particle shimmer
setInterval(()=>{
  if (coupleWrap.style.opacity === '1') {
    spawnBurst(
      40+Math.random()*(W-80),
      H*0.25+Math.random()*H*0.55,
      8, colors
    );
  }
}, 400);

</script>
</body>
</html>
